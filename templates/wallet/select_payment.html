<!DOCTYPE html>
<html>
<head>
    <title>Select Payment Method</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #1a1a1a;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
        }
        .amount {
            font-weight: bold;
            color: #1a1a1a;
            font-size: 1.25rem;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-naira {
            background-color: #00C853; /* Korapay Green-ish */
            color: white;
        }
        .btn-naira:hover {
            background-color: #00E676;
        }
        .btn-crypto {
            background-color: #2962FF; /* Blue for Crypto */
            color: white;
        }
        .btn-crypto:hover {
            background-color: #448AFF;
        }
        .secure-icon {
            margin-bottom: 1rem;
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="secure-icon">🛡️</div>
        <h1>Secure Deposit</h1>
        <p>Amount to deposit: <span class="amount">NGN {{ amount }}</span></p>
        
        <form action="{% url 'process-payment-choice' reference=reference %}" method="POST">
            {% csrf_token %}
            <button type="submit" name="payment_method" value="KORAPAY" class="btn btn-naira">
                Pay with Naira 🇳🇬
            </button>
            <button type="submit" name="payment_method" value="NOWPAYMENTS" class="btn btn-crypto">
                Pay with Crypto (USDT) ₮
            </button>
        </form>
    </div>
</body>
</html>
